<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sterflix | Asset Explorer</title>
    
    <link rel="icon" type="image/png" href="https://assets.sterflix.com/assets/Sterflix-Logo.png">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        :root {
            --purple-gradient: linear-gradient(135deg, #9d2bb3, #4b0082);
            --gui-bg: rgba(0, 0, 0, 0.65); 
        }

        /* ANIMATIONS */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

        body {
            min-height: 100vh; width: 100vw;
            font-family: 'Inter', -apple-system, sans-serif;
            background: #000 url('https://assets.sterflix.com/assets/Sterflix-Backround.jpg') center/cover no-repeat fixed;
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 10%, rgba(0,0,0,0.85) 100%);
            pointer-events: none; z-index: 1;
        }

        .header {
            position: relative; z-index: 10;
            background: var(--gui-bg);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            width: 100%; max-width: 1000px;
            padding: 25px; border-radius: 30px;
            text-align: center; border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
            animation: fadeInUp 0.6s ease-out;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .return-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 10px 18px;
            border-radius: 15px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .return-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #9d2bb3;
        }

        h1 { font-size: 1.8rem; font-weight: 800; background: var(--purple-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .search-box {
            width: 100%; max-width: 500px;
            padding: 14px 20px; border-radius: 18px; border: none;
            background: rgba(255, 255, 255, 0.08); color: white;
            outline: none; font-size: 1rem; border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .search-box:focus { border-color: #9d2bb3; background: rgba(255,255,255,0.12); }

        .asset-grid {
            position: relative; z-index: 10;
            width: 100%; max-width: 1100px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            justify-items: center; /* Centers cards in the grid */
            animation: fadeInUp 0.8s ease-out;
        }

        .asset-card {
            background: var(--gui-bg);
            backdrop-filter: blur(8px);
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centers content inside the card */
            text-align: center;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .asset-card:hover { transform: translateY(-5px); border-color: #9d2bb3; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .preview-box {
            width: 100%; aspect-ratio: 1/1;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .preview-box img { max-width: 85%; max-height: 85%; object-fit: contain; }
        .file-icon { color: #9d2bb3; opacity: 0.8; }

        .asset-name { font-size: 0.85rem; font-weight: 500; color: #eee; margin-bottom: 15px; word-break: break-all; height: 2.4rem; overflow: hidden; }

        .copy-btn {
            width: 100%; background: var(--purple-gradient);
            border: none; color: white; padding: 12px;
            border-radius: 15px; font-size: 0.75rem; font-weight: 800;
            cursor: pointer; transition: 0.2s;
        }
        .copy-btn:hover { filter: brightness(1.2); }
        .copy-btn:active { transform: scale(0.95); }

        .loading { grid-column: 1/-1; padding: 50px; font-weight: 600; opacity: 0.5; }

        /* Scrollbar */
        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-thumb { background: rgba(157, 43, 179, 0.4); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="nav-bar">
            <a href="https://sterflix.com/hub" class="return-btn">
                <i data-lucide="chevron-left" size="18"></i>
                Return to Hub
            </a>
            <h1>Asset Explorer</h1>
            <div style="width: 100px;"></div> </div>
        <input type="text" class="search-box" id="search-input" placeholder="Search files...">
    </div>

    <div class="asset-grid" id="asset-grid">
        <div class="loading">Fetching repository data...</div>
    </div>

    <script>
        const USERNAME = 'EpicSpider687'; 
        const REPO = 'Sterflix-Assets';
        const FOLDER = 'assets';

        async function loadAssets() {
            const grid = document.getElementById('asset-grid');
            try {
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${FOLDER}`);
                if (!response.ok) throw new Error("Folder not found");
                
                const files = await response.json();
                grid.innerHTML = '';

                files.forEach(file => {
                    if (file.type === 'file' && file.name !== 'index.html') {
                        const isImg = /\.(jpg|jpeg|png|gif|svg|webp)$/i.test(file.name);
                        const publicUrl = `https://${USERNAME}.github.io/${REPO}/${FOLDER}/${file.name}`;
                        
                        const card = document.createElement('div');
                        card.className = 'asset-card';
                        card.innerHTML = `
                            <div class="preview-box">
                                ${isImg ? `<img src="${file.download_url}">` : `<i data-lucide="file-text" class="file-icon" size="48"></i>`}
                            </div>
                            <p class="asset-name">${file.name}</p>
                            <button class="copy-btn" onclick="copyLink('${publicUrl}', this)">COPY LINK</button>
                        `;
                        grid.appendChild(card);
                    }
                });
                lucide.createIcons();
            } catch (err) {
                grid.innerHTML = `<div class="loading">Error: ${err.message}</div>`;
            }
        }

        function copyLink(url, btn) {
            navigator.clipboard.writeText(url);
            const originalText = btn.innerText;
            btn.innerText = "COPIED!";
            btn.style.background = "#28a745";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
            }, 1500);
        }

        document.getElementById('search-input').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            document.querySelectorAll('.asset-card').forEach(card => {
                const name = card.querySelector('.asset-name').innerText.toLowerCase();
                card.style.display = name.includes(term) ? 'flex' : 'none';
            });
        });

        loadAssets();
        lucide.createIcons();
    </script>
</body>
</html>
